name: keep-warm

# Keeps the free Render instance from sleeping (it spins down after ~15 min idle,
# causing a ~30-60s cold start on the next request). A public-repo Actions run is
# unmetered, so this is free. Also doubles as a lightweight uptime check.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (UTC); Render sleeps at ~15 min idle
  workflow_dispatch: {} # allow manual runs from the Actions tab

# If a run is still going when the next fires, cancel the old one.
concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint (retry through any cold start)
        env:
          # Change this if the Render URL changes.
          URL: https://eduverify-png.onrender.com/api/health
        run: |
          for i in $(seq 1 6); do
            code=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 60 "$URL" || echo 000)
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "service awake:"; cat /tmp/body; echo
              exit 0
            fi
            sleep 15
          done
          echo "::error::service did not return 200 after retries"
          exit 1
