# Render blueprint — single free web service that serves BOTH the API and the
# built React frontend from one origin (no CORS, no cross-service URL config).
#
# Deploy: Render Dashboard -> New -> Blueprint -> pick dale-sapalonah/EduVerify-PNG.
# Everything below is preset for a $0 staging preview in mock mode.
services:
  - type: web
    name: eduverify-png
    runtime: node
    plan: free
    region: singapore          # closest free region to PNG; change if unavailable
    rootDir: .
    # Build the frontend (base "/" because Render sets RENDER=true) then install
    # the backend dependencies. The backend uses Node's built-in SQLite module.
    buildCommand: npm install && npm run build && npm install --prefix backend
    startCommand: node backend/server.js
    healthCheckPath: /api/health
    autoDeploy: true            # redeploy on every push to main
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: BASE_PATH
        value: "/"
      # Staging runs in mock mode: the persona picker stands in for a real wallet.
      - key: MOCK_MODE
        value: "true"
      - key: STATE_EXPIRY_MINUTES
        value: "10"
      - key: APP_SESSION_MINUTES
        value: "480"
      - key: COOKIE_SECURE
        value: "true"
      # --- Live SSO secrets: leave unset while MOCK_MODE=true. Fill in Render's
      # dashboard (never commit) when switching to a real SevisPass server. ---
      - key: OIDC4VP_SERVER_URL
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: CALLBACK_URL
        sync: false
      - key: SSO_REQUEST_ORIGIN
        sync: false
      - key: AUTH_SUCCESS_URL
        sync: false
      - key: AUTH_FAILURE_URL
        sync: false
      - key: SSO_JWKS_URI
        sync: false
